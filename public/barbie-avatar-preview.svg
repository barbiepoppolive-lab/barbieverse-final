<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c06080"/>
      <stop offset="40%" style="stop-color:#a04060"/>
      <stop offset="100%" style="stop-color:#703050"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8447a"/>
      <stop offset="50%" style="stop-color:#d63384"/>
      <stop offset="100%" style="stop-color:#b02060"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c0a0"/>
      <stop offset="100%" style="stop-color:#e0a888"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#fff5cc"/>
      <stop offset="100%" style="stop-color:#e8b830"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a15"/>
      <stop offset="50%" style="stop-color:#120810"/>
      <stop offset="100%" style="stop-color:#0a0508"/>
    </linearGradient>
    <radialGradient id="bokeh1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8447a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#e8447a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bokeh2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d63384;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d63384;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="120" cy="120" r="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="120" cy="120" r="118" fill="url(#bgGrad)" stroke="url(#dressGrad)" stroke-width="2.5"/>

  <g clip-path="url(#circleClip)">
    <!-- Bokeh background lights -->
    <circle cx="40" cy="50" r="25" fill="url(#bokeh1)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="40" r="20" fill="url(#bokeh2)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="30" cy="180" r="18" fill="url(#bokeh1)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="210" cy="170" r="22" fill="url(#bokeh2)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="120" cy="30" r="15" fill="url(#bokeh1)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="180" cy="100" r="12" fill="url(#bokeh2)">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="60" cy="120" r="10" fill="url(#bokeh1)">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="3.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <!-- Small floating particles -->
    <g>
      <circle cx="55" cy="70" r="1.5" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="70;60;70" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="185" cy="80" r="1" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
        <animate attributeName="cy" values="80;68;80" dur="3s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="75" cy="160" r="1.2" fill="#e8447a" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="cy" values="160;148;160" dur="2.8s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="170" cy="150" r="1.5" fill="#ffd700" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
        <animate attributeName="cy" values="150;140;150" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
      </circle>
      <circle cx="100" cy="45" r="1" fill="#e8447a" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3.2s" repeatCount="indefinite" begin="0.7s"/>
        <animate attributeName="cy" values="45;35;45" dur="3.2s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
      <circle cx="150" cy="55" r="0.8" fill="#fff" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite" begin="2s"/>
        <animate attributeName="cy" values="55;45;55" dur="2s" repeatCount="indefinite" begin="2s"/>
      </circle>
    </g>

    <!-- ===== CHARACTER (Side profile facing left) ===== -->
    <g transform="translate(105, 15)">

      <!-- Flowing wavy hair (back layer) -->
      <path d="M-5 70 C-15 85, -25 110, -30 140 C-35 165, -30 190, -20 205 C-15 212, -5 215, 5 210 C0 195, -10 170, -15 145 C-18 125, -15 105, -8 88 Z" fill="url(#hairGrad)" opacity="0.85"/>
      <path d="M10 65 C0 80, -15 105, -22 135 C-28 160, -25 188, -18 205 C-12 215, 0 218, 10 212 C5 198, -5 175, -8 150 C-10 130, -8 108, 0 90 Z" fill="url(#hairGrad)" opacity="0.75"/>

      <!-- Wavy hair strands (flowing down) -->
      <path d="M-20 130 C-30 145, -38 165, -35 185 C-32 200, -22 210, -15 205 C-18 195, -25 175, -22 155 C-20 140, -18 132, -20 130 Z" fill="url(#hairGrad)" opacity="0.6"/>
      <path d="M5 120 C-5 140, -12 165, -10 190 C-8 205, 0 212, 8 208 C2 195, -3 170, 0 148 C2 132, 4 122, 5 120 Z" fill="url(#hairGrad)" opacity="0.55"/>

      <!-- Hair highlights (shimmer) -->
      <path d="M-8 75 C-12 90, -18 110, -20 130" fill="none" stroke="#d08090" stroke-width="1.5" opacity="0.4">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M2 70 C-2 88, -8 108, -12 128" fill="none" stroke="#d08090" stroke-width="1" opacity="0.3">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
      </path>

      <!-- Neck -->
      <path d="M12 72 C10 80, 8 90, 8 100 L22 100 C22 90, 20 80, 18 72 Z" fill="url(#skinGrad)"/>

      <!-- Shoulder / upper body -->
      <path d="M-15 100 C-5 95, 8 92, 15 95 C25 92, 35 95, 42 100 L48 130 C48 140, 35 148, 15 148 C-5 148, -20 140, -20 130 Z" fill="url(#skinGrad)"/>

      <!-- Sparkly dress (side view) -->
      <path d="M-18 125 C-8 120, 8 118, 15 120 C25 118, 38 122, 45 128 L50 175 C50 190, 35 200, 15 200 C-5 200, -22 190, -22 175 Z" fill="url(#dressGrad)"/>

      <!-- Dress sparkles -->
      <g opacity="0.7">
        <circle cx="0" cy="135" r="1" fill="#fff">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="10" cy="145" r="0.8" fill="#ffd700">
          <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2s" repeatCount="indefinite" begin="0.3s"/>
        </circle>
        <circle cx="20" cy="130" r="1.2" fill="#fff">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
        </circle>
        <circle cx="30" cy="142" r="0.7" fill="#ffd700">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite" begin="0.9s"/>
        </circle>
        <circle cx="5" cy="155" r="0.9" fill="#fff">
          <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.6s" repeatCount="indefinite" begin="1.2s"/>
        </circle>
        <circle cx="15" cy="165" r="1.1" fill="#ffd700">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
        </circle>
        <circle cx="25" cy="158" r="0.6" fill="#fff">
          <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.9s" repeatCount="indefinite" begin="1.5s"/>
        </circle>
        <circle cx="35" cy="170" r="0.8" fill="#ffd700">
          <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.1s" repeatCount="indefinite" begin="0.7s"/>
        </circle>
        <circle cx="-5" cy="175" r="1" fill="#fff">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite" begin="1.8s"/>
        </circle>
        <circle cx="8" cy="185" r="0.7" fill="#ffd700">
          <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.3s" repeatCount="indefinite" begin="0.2s"/>
        </circle>
        <circle cx="22" cy="180" r="1.3" fill="#fff">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.4s" repeatCount="indefinite" begin="1.1s"/>
        </circle>
        <circle cx="32" cy="188" r="0.5" fill="#ffd700">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
        </circle>
        <circle cx="0" cy="195" r="0.9" fill="#fff">
          <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite" begin="1.4s"/>
        </circle>
        <circle cx="12" cy="192" r="0.6" fill="#ffd700">
          <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.1s"/>
        </circle>
      </g>

      <!-- Head (side profile facing left) -->
      <path d="M8 30 C-2 30, -8 40, -8 55 C-8 70, 0 80, 10 82 C18 80, 24 70, 24 55 C24 40, 18 30, 8 30 Z" fill="url(#skinGrad)"/>

      <!-- Hair on head (voluminous, wavy) -->
      <path d="M-2 28 C-5 15, 5 5, 15 5 C25 5, 35 15, 32 28 C35 22, 30 12, 20 10 C10 10, 0 18, -2 28 Z" fill="url(#hairGrad)"/>
      <path d="M-5 35 C-10 25, -5 12, 5 8 C15 4, 28 10, 32 22 C30 15, 20 8, 10 10 C0 12, -5 22, -5 35 Z" fill="url(#hairGrad)" opacity="0.9"/>
      <!-- Hair strand falling on face -->
      <path d="M-2 32 C-8 40, -12 55, -10 68 C-9 75, -5 78, -2 75 C-4 65, -6 50, -3 38 Z" fill="url(#hairGrad)" opacity="0.8"/>

      <!-- Earring -->
      <ellipse cx="-2" cy="68" rx="2" ry="3.5" fill="#ffd700" filter="url(#glow)" opacity="0.8">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Eye (side view - closed/looking down) -->
      <path d="M0 52 C2 50, 6 50, 8 52" fill="none" stroke="#3a2020" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Eyelashes -->
      <path d="M-1 51 L0 49" fill="none" stroke="#3a2020" stroke-width="0.6" stroke-linecap="round"/>
      <path d="M2 50 L2.5 48" fill="none" stroke="#3a2020" stroke-width="0.6" stroke-linecap="round"/>
      <path d="M5 50 L5.5 48.5" fill="none" stroke="#3a2020" stroke-width="0.6" stroke-linecap="round"/>

      <!-- Nose (subtle side profile) -->
      <path d="M-4 58 C-5 62, -6 66, -4 68" fill="none" stroke="#d09878" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

      <!-- Lips -->
      <path d="M-2 72 C0 70, 4 70, 6 72" fill="#c04060" opacity="0.7"/>
      <path d="M-2 72 C0 74, 4 74, 6 72" fill="#a03050" opacity="0.6"/>

      <!-- ===== CRYSTAL TIARA ===== -->
      <g transform="translate(12, 10)" filter="url(#glow)">
        <!-- Tiara base -->
        <path d="M-18 8 C-15 5, -10 2, -5 5 C-2 0, 2 0, 5 5 C10 2, 15 5, 18 8" fill="none" stroke="url(#crownGrad)" stroke-width="1.5"/>
        <!-- Crystal points -->
        <path d="M-14 6 L-12 -2 L-10 6" fill="url(#crownGrad)" opacity="0.9"/>
        <path d="M-6 4 L-4 -6 L-2 4" fill="url(#crownGrad)" opacity="0.9"/>
        <path d="M0 3 L2 -8 L4 3" fill="url(#crownGrad)"/>
        <path d="M6 4 L8 -5 L10 4" fill="url(#crownGrad)" opacity="0.9"/>
        <path d="M12 6 L14 -1 L16 6" fill="url(#crownGrad)" opacity="0.9"/>
        <!-- Center jewel -->
        <circle cx="2" cy="-5" r="2" fill="#fff" opacity="0.9">
          <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="2" cy="-5" r="3.5" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.5">
          <animate attributeName="r" values="3;4.5;3" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <!-- Side jewels -->
        <circle cx="-12" cy="0" r="1.2" fill="#e8447a" opacity="0.7"/>
        <circle cx="14" cy="0" r="1.2" fill="#e8447a" opacity="0.7"/>
        <!-- Tiny sparkle on tiara -->
        <circle cx="-4" cy="-3" r="0.8" fill="#fff" opacity="0">
          <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="8" cy="-2" r="0.6" fill="#fff" opacity="0">
          <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
        </circle>
      </g>
    </g>
  </g>

  <!-- Outer glow ring -->
  <circle cx="120" cy="120" r="116" fill="none" stroke="url(#dressGrad)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="114;118;114" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
